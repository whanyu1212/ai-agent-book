<text x="737.9" y="420" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="8" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">A の結果 + B の結果 + C のキャンセル記録</text>
<rect x="120" y="460" width="740" height="40" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="130" y="480" font-family="'Courier New', Courier, monospace" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central">要点: プレースホルダー注入 + 非同期完了イベント + cancel_tool(task_id) API</text>
</svg>