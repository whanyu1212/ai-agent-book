<text x="260" y="325" font-family="'Courier New', Courier, monospace" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central">&lt;think&gt;天気を照会する必要がある、get_weather ツールを呼ぶ&lt;/think&gt;</text>
