<text x="515" y="349.0" font-family="'Courier New', Courier, monospace" font-size="11" fill="#333333" text-anchor="start" dominant-baseline="central">② 対話: &quot;refund $150&quot; を含む</text>
<text x="515" y="367.0" font-family="'Courier New', Courier, monospace" font-size="8.5" fill="#333333" text-anchor="start" dominant-baseline="central">         &quot;3-5 business days to arrive&quot; を含む</text>
<line x1="660" y1="380" x2="660" y2="406" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="520" y="408" width="280" height="40" rx="6" fill="#999999" stroke="#333333" stroke-width="2"/>
<text x="660" y="428" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-weight="bold">reward = 0/1（両方合格）</text>
<rect x="500" y="460" width="320" height="30" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
