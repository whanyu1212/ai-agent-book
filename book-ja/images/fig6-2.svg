<text x="660" y="302" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">二重検証</text>
<rect x="505" y="312" width="310" height="66" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
