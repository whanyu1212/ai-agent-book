<line x1="762" y1="137" x2="762" y2="168" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="490" y="170" width="340" height="80" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="660" y="192" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">ツール呼び出し</text>
