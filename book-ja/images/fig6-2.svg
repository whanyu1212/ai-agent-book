<rect x="80" y="445" width="280" height="30" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="90" y="460" font-family="'Courier New', Courier, monospace" font-size="10.5" fill="#333333" text-anchor="start" dominant-baseline="central">特徴：人間/LLM による評価が不要</text>
