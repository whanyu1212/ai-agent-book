<text x="65" y="302" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">&lt;/interpreter&gt;</text>
<line x1="240" y1="311" x2="240" y2="317" stroke="#999999" stroke-width="2" marker-end="url(#ah-light)"/>
<rect x="50" y="318" width="380" height="78" rx="4" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="60" y="336" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="bold">テキスト思考₂</text>
<text x="65" y="356" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">&quot;解：x=-4 または x=2</text>
