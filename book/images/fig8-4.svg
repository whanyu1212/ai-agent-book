<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" width="1000" height="380" style="background:#ffffff">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#33434d"/></marker>
    <style>
      .t{font-family:Arial,'PingFang SC','Microsoft YaHei',sans-serif;fill:#26343c}
      .h{font-size:19px;font-weight:700}
      .s{font-size:15px;fill:#52636d}
      .box{fill:#f5f7f8;stroke:#33434d;stroke-width:2}
      .accent{fill:#e8f1f5;stroke:#2f617a;stroke-width:2}
      .line{fill:none;stroke:#33434d;stroke-width:2;marker-end:url(#arrow)}
    </style>
  </defs>
  <text x="500" y="30" text-anchor="middle" class="t h">经验知识化：原始轨迹是证据，知识文档才是复用单元</text>

  <rect x="22" y="78" width="168" height="96" rx="8" class="box"/>
  <text x="106" y="111" text-anchor="middle" class="t h">原始轨迹</text>
  <text x="106" y="139" text-anchor="middle" class="t s">动作、结果、环境</text>
  <text x="106" y="160" text-anchor="middle" class="t s">不可变证据</text>

  <rect x="215" y="78" width="168" height="96" rx="8" class="box"/>
  <text x="299" y="111" text-anchor="middle" class="t h">单次评价</text>
  <text x="299" y="139" text-anchor="middle" class="t s">成功、失败、标签</text>
  <text x="299" y="160" text-anchor="middle" class="t s">保留证据位置</text>

  <rect x="408" y="63" width="184" height="126" rx="8" class="accent"/>
  <text x="500" y="97" text-anchor="middle" class="t h">跨轨迹比较</text>
  <text x="500" y="128" text-anchor="middle" class="t s">聚合同类任务</text>
  <text x="500" y="151" text-anchor="middle" class="t s">对照成功与失败</text>
  <text x="500" y="174" text-anchor="middle" class="t s">提取共性与边界</text>

  <rect x="617" y="63" width="184" height="126" rx="8" class="accent"/>
  <text x="709" y="97" text-anchor="middle" class="t h">Markdown 文档</text>
  <text x="709" y="128" text-anchor="middle" class="t s">适用场景与策略</text>
  <text x="709" y="151" text-anchor="middle" class="t s">例外、禁区与来源</text>
  <text x="709" y="174" text-anchor="middle" class="t s">版本与验证时间</text>

  <rect x="826" y="78" width="152" height="96" rx="8" class="box"/>
  <text x="902" y="111" text-anchor="middle" class="t h">检索应用</text>
  <text x="902" y="139" text-anchor="middle" class="t s">新任务按需加载</text>
  <text x="902" y="160" text-anchor="middle" class="t s">继续产生反馈</text>

  <path d="M190 126 H213" class="line"/>
  <path d="M383 126 H406" class="line"/>
  <path d="M592 126 H615" class="line"/>
  <path d="M801 126 H824" class="line"/>

  <path d="M902 174 V244 H500 V191" class="line" stroke-dasharray="7 5"/>
  <text x="700" y="270" text-anchor="middle" class="t s">新证据用于修订、限定或淘汰旧知识</text>

  <rect x="215" y="302" width="586" height="48" rx="8" fill="#fafbfb" stroke="#9aa8af"/>
  <text x="508" y="332" text-anchor="middle" class="t s">与第三章共用抽取和检索基础设施；本章新增轨迹评价与行为改进闭环</text>
</svg>
